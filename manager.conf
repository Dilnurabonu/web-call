; /etc/asterisk/manager.conf  — AMI (real vaqt monitoringi uchun)
[general]
enabled = yes
port = 5038
bindaddr = 0.0.0.0          ; ishlab chiqarishda faqat backend IP'siga cheklang!

[dashboard]
secret = amisecret          ; .env dagi AMI_SECRET bilan bir xil bo'lsin
deny = 0.0.0.0/0.0.0.0
permit = 172.16.0.0/12      ; Docker tarmog'i / backend IP
read = call,cdr,system,agent,user
write = originate,command
